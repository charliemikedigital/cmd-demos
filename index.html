<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Demos</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
        background: #08070a;
        color: #efeae0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main { width: 100%; max-width: 520px; }
      h1 {
        font-size: 0.7rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #8a8376;
        margin-bottom: 1.5rem;
        font-weight: 500;
      }
      ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
      a {
        display: block;
        padding: 1rem 1.25rem;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        color: #efeae0;
        text-decoration: none;
        transition: border-color 0.2s, background 0.2s;
      }
      a:hover {
        border-color: rgba(245,184,74,0.4);
        background: rgba(255,255,255,0.05);
      }
      .name { font-weight: 600; font-size: 0.95rem; }
      .meta {
        font-size: 0.72rem;
        color: #8a8376;
        margin-top: 0.2rem;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Demos</h1>
      <ul>
        <li>
          <a href="/cmd-demos/kingdom-plumbing/">
            <div class="name">Kingdom Plumbing, LLC</div>
            <div class="meta">/kingdom-plumbing/</div>
          </a>
        </li>
        <li>
          <a href="/cmd-demos/walters-brothers-plumbing/">
            <div class="name">Walters Brothers Plumbing</div>
            <div class="meta">/walters-brothers-plumbing/</div>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
